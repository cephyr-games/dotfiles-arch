[mgr]
prepend_keymap = [
    { on = "i", run = "arrow prev", desc = "Previous file" },
    { on = "e", run = "arrow next", desc = "Next file" },
    { on = "n", run = "leave", desc = "Back to the parent directory" },
    { on = "o", run = "enter", desc = "Enter the child directory" },
    { on = "N", run = "back",    desc = "Back to previous directory" },
    { on = "O", run = "forward", desc = "Forward to next directory" },
    { on = "l",         run = "open",                        desc = "Open selected files" },
    { on = "L",         run = "open --interactive",          desc = "Open selected files interactively" },
    { on = "j", run = "find_arrow",              desc = "Next found" },
    { on = "J", run = "find_arrow --previous",   desc = "Previous found" },
    { on = "S", run = "search --via=fd", desc = "Search files by name via fd" },
    { on = "s", run = 'shell "$SHELL" --block', desc = "Open shell here" },
    { on = [ "Y" ], run = '''
        shell 'dragon-drop -x -A "$@"' --confirm
    ''' },
    { on = [ "T" ], run = '''
        shell '$TERMINAL --working-directory "%d"' --confirm
    ''' },
    { on = "I", run = "arrow -20%", desc = "Move cursor up half page" },
    { on = "E", run = "arrow 20%", desc = "Move cursor down half page" },
    { on = [ "A" ], run = '''shell 'archiver  "$@" # enter format (7z, tar.gz, zip)' --cursor=9 --interactive''' , desc = "Archive selected file(s) with format prompt" }, 
]
[tasks]
prepend_keymap = [
	{ on = "i", run = "arrow prev", desc = "Previous task" },
	{ on = "e", run = "arrow next", desc = "Next task" },
]
[spot]
prepend_keymap = [
  { on = "i", run = "arrow prev", desc = "Previous line" },
	{ on = "e", run = "arrow next", desc = "Next line" },
	{ on = "n", run = "swipe prev", desc = "Swipe to previous file" },
	{ on = "o", run = "swipe next", desc = "Swipe to next file" },
]
[pick]
prepend_keymap = [
  { on = "i", run = "arrow prev", desc = "Previous option" },
	{ on = "e", run = "arrow next", desc = "Next option" },
]
[input]
prepend_keymap = [
	{ on = "n", run = "move -1", desc = "Move back a character" },
	{ on = "o", run = "move 1", desc = "Move forward a character" },
  { on = "h", run = "insert", desc = "Enter insert mode" },
	{ on = "H", run = [ "move first-char", "insert" ], desc = "Move to the BOL, and enter insert mode" },
  { on = "k", run = "forward --end-of-word", desc = "Move forward to the end of the current or next word" },
	{ on = "K", run = "forward --far --end-of-word", desc = "Move forward to the end of the current or next WORD" },
	{ on = "<C-k>", run = "move eol", desc = "Move to the EOL" },
 	{ on = "<C-n>", run = "backspace", desc = "Delete the character before the cursor" },
]
[confirm]
prepend_keymap = [
	{ on = "i", run = "arrow prev", desc = "Previous line" },
	{ on = "e", run = "arrow next", desc = "Next line" },
]
[cmp]
prepend_keymap = [
	{ on = "<A-i>", run = "arrow prev", desc = "Previous item" },
	{ on = "<A-e>", run = "arrow next", desc = "Next item" },
]
[help]
prepend_keymap = [
	{ on = "i", run = "arrow prev", desc = "Previous line" },
	{ on = "e", run = "arrow next", desc = "Next line" },
]
