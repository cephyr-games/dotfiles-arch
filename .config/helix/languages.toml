[[language]]
name = "c-sharp"
auto-format = true
scope = "source.cs"
file-types = ["cs"]
roots = ["*.sln", "*.csproj", ".git"]
formatter = { command = "csharpier", args = ["format", "--write-stdout"] }
language-servers = ["csharp-ls"]

[language-server.gdscript-lsp]
command = "nc"
args = ["127.0.0.1", "6005"]

[[language]]
name = "gdscript"
auto-format = true
scope = "source.gd"
roots = ["project.godot", ".git"]
file-types = ["gd"]
formatter = { command = "gdscript-formatter", args = ["--reorder-code"] }
language-servers = ["gdscript-lsp"]
