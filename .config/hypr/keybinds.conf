$mainMod = SUPER # Sets "Linux" key as main modifier

# top row left
bind = $mainMod, Q, exec, uwsm app -- $fileManager
bind = $mainMod SHIFT, Q, exec, uwsm app -- $fileManagerImageSupport
bind = $mainMod, W, exec, uwsm app -- $browser
bind = $mainMod, F, exec, uwsm app -- $terminal
bind = $mainMod, P, exec, uwsm app -- $launcher
bind = $mainMod, G, exec, uwsm app -- signal-desktop

# middle row left
bind = $mainMod, A, exec, hyprctl hyprsunset temperature 2700 # enable night mode
bind = $mainMod SHIFT, A, exec, hyprctl hyprsunset identity # disable night mode
bindl = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy
bindl = $mainMod CTRL, S, exec, grim -g "$(slurp)"
bindl = $mainMod SHIFT, S, exec, grim - | wl-copy
bindl = $mainMod CTRL SHIFT, S, exec, grim
bind = $mainMod, R, exec, hyprpicker -aq

# bottom row left
bindl = $mainMod, Z, exec, systemctl suspend
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, C, forcekillactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, V, fullscreen,

# top row right

# middle row right
bind = $mainMod, N, movefocus, l
bind = $mainMod, E, movefocus, d
bind = $mainMod, I, movefocus, u
bind = $mainMod, O, movefocus, r
bind = $mainMod CTRL, N, movewindow, l
bind = $mainMod CTRL, E, movewindow, d
bind = $mainMod CTRL, I, movewindow, u
bind = $mainMod CTRL, O, movewindow, r
$resize_factor = 16
binde = $mainMod SHIFT, N, resizeactive, -$resize_factor 0
binde = $mainMod SHIFT, E, resizeactive, 0 $resize_factor
binde = $mainMod SHIFT, I, resizeactive, 0 -$resize_factor
binde = $mainMod SHIFT, O, resizeactive, $resize_factor 0

# bottom row right

# special
bind = $mainMod CTRL SHIFT, L, exec, hyprlock
bindl = $mainMod CTRL SHIFT, Y, exec, shutdown now
bindl = $mainMod CTRL SHIFT, I, exec, uwsm stop
bind = $mainMod CTRL SHIFT, J, exec, if pgrep -x waybar > /dev/null; then pkill waybar; else uwsm app -- waybar; fi

#bind = $mainMod CTRL, M, exec, $HOME/.config/kitty/switch-mango.sh
#bind = $mainMod CTRL SHIFT, M, exec, $HOME/.config/kitty/switch-mango-alt.sh

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = SHIFT, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-
bindel = SHIFT, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
bindel = SHIFT, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = SHIFT, XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindel = SHIFT, XF86MonBrightnessDown, exec, brightnessctl s 1%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

