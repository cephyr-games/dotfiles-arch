add_newline = true
palette = 'colors'

format = '''
[╭](fg:txt_highlight)$os$username$sudo$directory$git_branch[](fg:purple)
[╰](fg:txt_highlight)$character'''

[palettes.colors]
dark_base = '#060002'                # @@dark_base@@ 
dark_main = '#211111'                # @@dark_main@@ 
light_base = '#ab3d77'               # @@light_base@@ 
light_main = '#d15895'               # @@light_main@@ 
light_highlight = '#e172a8'          # @@light_highlight@@
txt_main = '#f071ae'                 # @@txt_main@@ 
txt_dark = '#1f1f1f'                 # @@txt_dark@@ 
txt_highlight = '#e571f0'            # @@txt_highlight@@ 
txt_red = '#d1261d'                  # @@txt_red@@        

# Prompt symbols 
[character]
success_symbol = '[>](txt_highlight)'
error_symbol = '[>](txt_red)'

[os]
disabled = false
format = '[](fg:blue)[$symbol]($style)'
style = "bg:blue fg:dark_main"

[sudo]
style = 'fg:blue bg:dark_main'
format = '[ as sudo ]($style)'
disabled = false

[username]
format = '[](fg:dark_main bg:blue)[$user]($style)'
style_user = 'fg:txt_main bg:dark_main'
style_root = 'fg:txt_main bg:dark_main'
show_always = true

[directory]
read_only = ' c#'
truncate_to_repo = true
truncation_symbol = "…/"
style = 'fg:dark_main bg:purple'
format = '[](fg:purple bg:dark_main)[ in $path$read_only ]($style)'

[git_branch]
style = 'fg:green bg:dark_main'
format = '[](fg:dark_main bg:purple)[on $symbol$branch(:$remote_branch) ]($style)[](fg:purple bg:dark_main)'
truncation_symbol = "…/"
symbol = ''

[os.symbols]
NixOS = " "
Windows = "󰍲 "
Ubuntu = "󰕈 "
SUSE = " "
Raspbian = "󰐿 "
Mint = "󰣭 "
Macos = "󰀵 "
Manjaro = " "
Linux = "󰌽 "
Gentoo = "󰣨 "
Fedora = "󰣛 "
Alpine = " "
Amazon = " "
Android = " "
Arch = "󰣇 "
Artix = "󰣇 "
EndeavourOS = " "
CentOS = " "
Debian = "󰣚 "
Redhat = "󱄛 "
RedHatEnterprise = "󱄛 "
Pop = " "